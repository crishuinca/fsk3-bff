name: CI - bff-libroclases

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test-and-analyze:
    runs-on: ubuntu-latest

    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run tests and coverage
        run: ./mvnw -B verify

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-bff-libroclases
          path: target/site/jacoco

      - name: SonarQube analysis
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_ORGANIZATION != '' }}
        run: |
          PROJECT_KEY="${SONAR_PROJECT_KEY:-${GITHUB_REPOSITORY//\//_}}"
          HOST_URL="${SONAR_HOST_URL:-https://sonarcloud.io}"
          ./mvnw -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.host.url="$HOST_URL" \
            -Dsonar.organization="$SONAR_ORGANIZATION" \
            -Dsonar.projectKey="$PROJECT_KEY" \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.exclusions=".github/workflows/**" \
            -Dsonar.coverage.exclusions="**/*Application.java,**/config/**,**/dto/**,**/entity/**,**/exception/**,**/controller/**"
